<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albstadt Bike Marathon — 3D-Karte</title>

  <!--
    Karten-Untergrund:
      Primär = LGL Baden-Württemberg DOP20 (digitale Orthophotos, 20 cm Bodenauflösung,
               OpenData, CORS aktiv, EPSG:3857 verfügbar, Format JPEG).
      Endpoint: https://owsproxy.lgl-bw.de/owsproxy/ows/WMS_LGL-BW_ATKIS_DOP_20_C
      Layer: IMAGES_DOP_20_RGB
      Per GetCapabilities am 2026-05-20 verifiziert (HTTP 200, Access-Control-Allow-Origin: *).
      Fallback = OpenStreetMap-Standard-Kacheln (per Basemap-Toggle umschaltbar).

    Gelände-Höhenmodell:
      AWS Open Data Terrain Tiles (Terrarium-Format, kostenlos, kein Token).
  -->

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://rsms.me" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

  <style>
    :root {
      --bw-rot: #E30613;            /* Bergwacht-Rot (CI) */
      --bg-panel: rgba(255, 255, 255, 0.94);
      --bg-panel-hover: rgba(255, 255, 255, 1);
      --txt: #1a1a1a;
      --txt-mute: #5a5a5a;
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: var(--font); color: var(--txt); }
    #map { position: absolute; inset: 0; }

    .panel {
      position: absolute;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.4;
      z-index: 5;
    }

    .panel h2 {
      margin: 0 0 8px 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--txt-mute);
    }

    /* Layer-Control oben rechts */
    #layers { top: 14px; right: 14px; min-width: 200px; }
    #layers label {
      display: flex; align-items: center; gap: 9px;
      padding: 4px 0; cursor: pointer; user-select: none;
    }
    #layers label:hover { color: var(--bw-rot); }
    #layers input[type="checkbox"] {
      accent-color: var(--bw-rot);
      width: 15px; height: 15px;
      margin: 0; cursor: pointer;
    }
    .swatch {
      display: inline-block; width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      vertical-align: middle;
    }
    .swatch.line {
      height: 4px; border-radius: 2px; align-self: center;
    }

    /* Kollabierbare Panels: Header bleibt sichtbar (zeigt nur den Toggle-Button),
       der eigentliche Inhalt klappt mit Transition weg. */
    .collapsible { transition: padding 0.22s ease, min-width 0.22s ease; }
    .collapsible .panel-content {
      overflow: hidden;
      max-height: 1200px;
      opacity: 1;
      transition: max-height 0.28s ease, opacity 0.18s ease, margin 0.22s ease;
    }
    .collapsible.collapsed { padding: 6px; min-width: 0; }
    .collapsible.collapsed .panel-content {
      max-height: 0;
      opacity: 0;
      margin: 0;
      pointer-events: none;
    }
    .panel-toggle {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--txt-mute); border-radius: 6px;
      font: inherit; line-height: 1; padding: 0;
      transition: background 0.12s, color 0.12s;
    }
    .panel-toggle:hover { background: rgba(0, 0, 0, 0.06); color: var(--txt); }
    .panel-toggle svg { width: 16px; height: 16px; display: block; }
    .panel-toggle .icon-collapsed { display: none; }
    .collapsible.collapsed .panel-toggle .icon-collapsed { display: block; }
    .collapsible.collapsed .panel-toggle .icon-expanded { display: none; }
    /* Wenn kollabiert: Toggle relativ positionieren, damit Panel auf Buttongröße schrumpft */
    .collapsible.collapsed .panel-toggle { position: static; }

    /* Layer-Panel braucht rechts Platz für den Toggle */
    #layers { padding-right: 38px; }

    /* Bottom-Left Controls */
    #controls { bottom: 14px; left: 14px; min-width: 220px; }
    #controls .row { margin-top: 10px; }
    #controls .row:first-of-type { margin-top: 0; }
    #controls label.field {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--txt-mute); margin-bottom: 6px;
    }
    #exaggeration { width: 100%; accent-color: var(--bw-rot); }
    #exaggeration-value {
      display: inline-block; min-width: 32px; text-align: right;
      font-variant-numeric: tabular-nums; color: var(--txt);
    }

    .basemap-toggle { display: flex; gap: 4px; }
    .basemap-toggle button {
      flex: 1; padding: 7px 10px;
      font: inherit; font-size: 12px;
      border: 1px solid var(--border); background: white;
      color: var(--txt); cursor: pointer;
      border-radius: 6px; transition: all 0.12s;
    }
    .basemap-toggle button:hover { background: #f5f5f5; }
    .basemap-toggle button.active {
      background: var(--bw-rot); color: white; border-color: var(--bw-rot);
    }

    /* Popups */
    .maplibregl-popup-content {
      font-family: var(--font); font-size: 13px;
      border-radius: 8px; box-shadow: var(--shadow);
      padding: 10px 14px;
    }
    .maplibregl-popup-content strong { color: var(--bw-rot); }
    .popup-kat {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #f0f0f0; color: var(--txt-mute);
      margin-left: 6px; vertical-align: middle;
    }

    /* Lade-Hinweis */
    #loading {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.85);
      z-index: 10; font-weight: 500; color: var(--txt-mute);
      transition: opacity 0.3s; pointer-events: none;
    }
    #loading.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Layer-Control: kollabierbar, Default = aufgeklappt. -->
  <div id="layers" class="panel collapsible" data-collapse-key="abm-layers">
    <button class="panel-toggle" type="button"
            aria-label="Layer-Control ein-/ausblenden"
            aria-expanded="true">
      <svg class="icon-expanded" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M4 4 L12 12 M12 4 L4 12"/>
      </svg>
      <svg class="icon-collapsed" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
        <path d="M8 1.5 L14.5 5 L8 8.5 L1.5 5 Z"/>
        <path d="M1.5 8 L8 11.5 L14.5 8"/>
        <path d="M1.5 11 L8 14.5 L14.5 11"/>
      </svg>
    </button>
    <div class="panel-content">
      <h2>Layer</h2>
      <label><input type="checkbox" id="lyr-strecke" checked>
        <span class="swatch line" style="background: #E30613;"></span> Marathon-Strecke
      </label>
      <label><input type="checkbox" id="lyr-posten" checked>
        <span class="swatch" style="background: #0288D1;"></span> Streckenposten
      </label>
      <label><input type="checkbox" id="lyr-marker">
        <span class="swatch" style="background: #FBC02D;"></span> 0,5-km-Marker
      </label>
      <label><input type="checkbox" id="lyr-zufahrt" checked>
        <span class="swatch line" style="background: #F57C00;"></span> Zufahrtswege
      </label>
    </div>
  </div>

  <div id="controls" class="panel">
    <div class="row">
      <label class="field" for="exaggeration">
        Gelände-Überhöhung <span id="exaggeration-value">1.3×</span>
      </label>
      <input type="range" id="exaggeration" min="1.0" max="2.0" step="0.1" value="1.3" />
    </div>
    <div class="row">
      <label class="field">Karten-Untergrund</label>
      <div class="basemap-toggle">
        <button type="button" data-basemap="dop" class="active">LGL DOP20</button>
        <button type="button" data-basemap="osm">OpenStreetMap</button>
      </div>
    </div>
  </div>

  <div id="loading">Karte wird geladen …</div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
  (function () {
    'use strict';

    const BW_ROT = '#E30613';

    /* -------- Quellen -------- */

    // LGL Baden-Württemberg DOP20 als WMS (WMS 1.1.1, EPSG:3857, JPEG, 512px Tiles).
    const LGL_DOP20_TILES = [
      'https://owsproxy.lgl-bw.de/owsproxy/ows/WMS_LGL-BW_ATKIS_DOP_20_C' +
      '?service=WMS&version=1.1.1&request=GetMap' +
      '&layers=IMAGES_DOP_20_RGB&styles=' +
      '&srs=EPSG:3857&bbox={bbox-epsg-3857}' +
      '&width=512&height=512&format=image/jpeg'
    ];

    // OSM-Fallback.
    const OSM_TILES = [
      'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
      'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
      'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png',
    ];

    // AWS Open Data Terrain Tiles (Terrarium-Format).
    const TERRARIUM_TILES = [
      'https://elevation-tiles-prod.s3.amazonaws.com/terrarium/{z}/{x}/{y}.png'
    ];

    /* -------- Style -------- */

    const style = {
      version: 8,
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources: {
        dop20: {
          type: 'raster',
          tiles: LGL_DOP20_TILES,
          tileSize: 512,
          minzoom: 0,
          maxzoom: 20,
          attribution: '© <a href="https://www.lgl-bw.de/" target="_blank" rel="noopener">LGL BW</a> DOP20 (Datenlizenz Deutschland – Namensnennung – 2.0)'
        },
        osm: {
          type: 'raster',
          tiles: OSM_TILES,
          tileSize: 256,
          minzoom: 0,
          maxzoom: 19,
          attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>'
        },
        'terrain-dem': {
          type: 'raster-dem',
          tiles: TERRARIUM_TILES,
          tileSize: 256,
          encoding: 'terrarium',
          maxzoom: 15,
          attribution: '© <a href="https://registry.opendata.aws/terrain-tiles/" target="_blank" rel="noopener">AWS Open Data Terrain Tiles</a>'
        }
      },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#dfe5e8' } },
        { id: 'dop20', type: 'raster', source: 'dop20',
          paint: { 'raster-fade-duration': 200 } },
        { id: 'osm', type: 'raster', source: 'osm',
          layout: { visibility: 'none' },
          paint: { 'raster-fade-duration': 200 } },
        { id: 'hillshade', type: 'hillshade', source: 'terrain-dem',
          paint: {
            'hillshade-shadow-color': 'hsl(210, 18%, 20%)',
            'hillshade-highlight-color': 'hsl(45, 30%, 95%)',
            'hillshade-accent-color': 'hsl(30, 20%, 50%)',
            'hillshade-exaggeration': 0.35
          } }
      ],
      sky: {
        'atmosphere-blend': [
          'interpolate', ['linear'], ['zoom'],
          0, 1.0,
          5, 0.8,
          7, 0.2,
          12, 0.0
        ]
      },
      terrain: { source: 'terrain-dem', exaggeration: 1.3 }
    };

    /* -------- Karte -------- */

    const map = new maplibregl.Map({
      container: 'map',
      style,
      center: [8.9916, 48.2543],   // Strecken-Mittelpunkt
      zoom: 11.2,
      pitch: 60,
      bearing: -18,
      minPitch: 0,
      maxPitch: 85,                // bis 85° für richtig schräge 3D-Ansichten
      hash: true,
      attributionControl: { compact: true },
      // Interaktive Gesten: alle MapLibre-Defaults explizit aktiv halten.
      //   Rechte Maustaste + ziehen          → drehen / kippen
      //   Trackpad 2 Finger + drehen         → Bearing
      //   Trackpad 2 Finger hoch/runter      → Pitch (touchPitch)
      //   Trackpad 2 Finger pinch            → Zoom + Rotate
      //   Strg/Cmd + Maus-Drag               → drehen + kippen
      dragRotate: true,
      pitchWithRotate: true,
      touchPitch: true,
      touchZoomRotate: true
    });

    // MapLibre-Bedienelemente nach bottom-right verschoben — so kollidiert
    // das Info-Panel oben links nicht mit der Navigation, und sämtliche
    // Bedienelemente liegen rechts/unten gebündelt.
    map.addControl(new maplibregl.NavigationControl({
      showCompass: true,           // Kompass + Pitch-Indikator (Klick auf Kompass → Bearing 0)
      showZoom: true,
      visualizePitch: true         // Kompass-Icon kippt mit der aktuellen Pitch-Ansicht
    }), 'bottom-right');
    map.addControl(new maplibregl.FullscreenControl(), 'bottom-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: 'metric' }), 'bottom-right');

    /* -------- Daten laden & Layer registrieren -------- */

    async function loadJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(url + ' → ' + r.status);
      return r.json();
    }

    async function loadOptionalJson(url) {
      try {
        const r = await fetch(url);
        if (!r.ok) return null;
        return await r.json();
      } catch (_) { return null; }
    }

    map.on('load', async () => {
      // Strecke + Posten + 500m sind Pflicht; Zufahrtswege sind optional (Platzhalter
      // für später ergänzbare Google-My-Maps-Daten).
      const [strecke, posten, marker] = await Promise.all([
        loadJson('daten/strecke.geojson'),
        loadJson('daten/posten.geojson'),
        loadJson('daten/marker_500m.geojson'),
      ]);
      const zufahrt = await loadOptionalJson('daten/zufahrtswege.geojson');

      map.addSource('strecke', { type: 'geojson', data: strecke });
      map.addSource('posten', { type: 'geojson', data: posten });
      map.addSource('marker500', { type: 'geojson', data: marker });
      if (zufahrt) map.addSource('zufahrt', { type: 'geojson', data: zufahrt });

      // Strecke: kräftig & kontrastreich, leichter Halo durch zwei Linien-Layer.
      map.addLayer({
        id: 'strecke-halo', type: 'line', source: 'strecke',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': '#ffffff',
          'line-opacity': 0.65,
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            8, 2,
            12, 5,
            16, 11
          ]
        }
      });
      map.addLayer({
        id: 'strecke-line', type: 'line', source: 'strecke',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': BW_ROT,
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            8, 1.2,
            12, 3,
            16, 7
          ]
        }
      });

      // Zufahrtswege (Linien und Points): orange, gestrichelt.
      if (zufahrt) {
        map.addLayer({
          id: 'zufahrt-line', type: 'line', source: 'zufahrt',
          filter: ['==', ['geometry-type'], 'LineString'],
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': '#F57C00',
            'line-width': [
              'interpolate', ['linear'], ['zoom'],
              8, 1,
              12, 2.5,
              16, 5
            ],
            'line-dasharray': [2, 1.5]
          }
        });
        map.addLayer({
          id: 'zufahrt-point', type: 'circle', source: 'zufahrt',
          filter: ['==', ['geometry-type'], 'Point'],
          paint: {
            'circle-radius': [
              'interpolate', ['linear'], ['zoom'],
              10, 3, 14, 6, 18, 10
            ],
            'circle-color': '#F57C00',
            'circle-stroke-color': '#ffffff',
            'circle-stroke-width': 1.5
          }
        });
      }

      // 0,5-km-Marker: klein, dezent gelb, Label mit km-Wert.
      map.addLayer({
        id: 'marker500-pt', type: 'circle', source: 'marker500',
        layout: { visibility: 'none' },
        paint: {
          'circle-radius': [
            'interpolate', ['linear'], ['zoom'],
            11, 2.5, 14, 4, 18, 7
          ],
          'circle-color': '#FBC02D',
          'circle-stroke-color': '#5d4a00',
          'circle-stroke-width': 1
        }
      });
      map.addLayer({
        id: 'marker500-label', type: 'symbol', source: 'marker500',
        layout: {
          visibility: 'none',
          'text-field': ['get', 'name'],
          'text-font': ['Noto Sans Regular'],
          'text-size': 10,
          'text-offset': [0, 1.1],
          'text-anchor': 'top',
          'text-allow-overlap': false,
          'text-optional': true
        },
        paint: {
          'text-color': '#3d2f00',
          'text-halo-color': '#ffffff',
          'text-halo-width': 1.3
        },
        minzoom: 12.5
      });

      // Posten: Farbe + Größe abhängig von Kategorie.
      const postenColor = [
        'match', ['get', 'kategorie'],
        'start', '#2E7D32',          // Start → grün
        'ziel',  '#C62828',          // Ziel  → dunkelrot
        'verpflegung', '#F57C00',    // Verpflegung → orange
        '#0288D1'                    // Default → Bergwacht-Blau
      ];
      const postenRadius = [
        'interpolate', ['linear'], ['zoom'],
        9,
          ['match', ['get', 'kategorie'], 'start', 4, 'verpflegung', 3.5, 2.5],
        14,
          ['match', ['get', 'kategorie'], 'start', 8, 'verpflegung', 7, 5],
        18,
          ['match', ['get', 'kategorie'], 'start', 14, 'verpflegung', 12, 9]
      ];

      map.addLayer({
        id: 'posten-pt', type: 'circle', source: 'posten',
        paint: {
          'circle-radius': postenRadius,
          'circle-color': postenColor,
          'circle-stroke-color': '#ffffff',
          'circle-stroke-width': 1.5,
          'circle-pitch-alignment': 'map'
        }
      });
      map.addLayer({
        id: 'posten-label', type: 'symbol', source: 'posten',
        layout: {
          'text-field': ['get', 'name'],
          'text-font': ['Noto Sans Regular'],
          'text-size': 11,
          'text-offset': [0, 1.2],
          'text-anchor': 'top',
          'text-allow-overlap': false,
          'text-optional': true
        },
        paint: {
          'text-color': '#1a1a1a',
          'text-halo-color': '#ffffff',
          'text-halo-width': 1.6
        },
        minzoom: 12
      });

      // Klick → Popup
      bindPopup('posten-pt', (props) =>
        `<strong>Posten ${esc(props.name)}</strong>` +
        `<span class="popup-kat">${esc(props.kategorie || 'posten')}</span>` +
        (props.beschreibung ? `<div style="margin-top:6px">${props.beschreibung}</div>` : '')
      );
      bindPopup('marker500-pt', (props) =>
        `<strong>${esc(props.name)}</strong>` +
        (props.km != null ? `<div style="color:#777;margin-top:2px">Distanz seit Start</div>` : '')
      );
      if (zufahrt) {
        bindPopup('zufahrt-line', (props) =>
          `<strong>${esc(props.name || 'Zufahrtsweg')}</strong>` +
          (props.beschreibung ? `<div style="margin-top:6px">${props.beschreibung}</div>` : '')
        );
        bindPopup('zufahrt-point', (props) =>
          `<strong>${esc(props.name || 'Zufahrt')}</strong>` +
          (props.beschreibung ? `<div style="margin-top:6px">${props.beschreibung}</div>` : '')
        );
      }

      // Pointer-Cursor über interaktiven Features.
      ['posten-pt', 'marker500-pt'].concat(zufahrt ? ['zufahrt-line', 'zufahrt-point'] : [])
        .forEach((id) => {
          map.on('mouseenter', id, () => map.getCanvas().style.cursor = 'pointer');
          map.on('mouseleave', id, () => map.getCanvas().style.cursor = '');
        });

      // Strecke an den Viewport anpassen — Initial-Bounding plus etwas Headroom.
      try {
        const bbox = computeBbox(strecke.features[0].geometry.coordinates);
        map.fitBounds(bbox, {
          padding: { top: 80, bottom: 80, left: 80, right: 240 },
          pitch: 60, bearing: -18, duration: 0, maxZoom: 14
        });
      } catch (_) { /* fallback bleibt im Style */ }

      document.getElementById('loading').classList.add('hidden');
      bindLayerToggles(zufahrt != null);
    });

    /* -------- UI: Layer-Toggles -------- */

    const LAYER_GROUPS = {
      'lyr-strecke':  ['strecke-halo', 'strecke-line'],
      'lyr-posten':   ['posten-pt', 'posten-label'],
      'lyr-marker':   ['marker500-pt', 'marker500-label'],
      'lyr-zufahrt':  ['zufahrt-line', 'zufahrt-point'],
    };

    function bindLayerToggles(hasZufahrt) {
      Object.entries(LAYER_GROUPS).forEach(([cb, layers]) => {
        const el = document.getElementById(cb);
        if (cb === 'lyr-zufahrt' && !hasZufahrt) {
          el.disabled = true; el.checked = false;
          el.parentElement.style.opacity = 0.45;
          return;
        }
        el.addEventListener('change', () => {
          const vis = el.checked ? 'visible' : 'none';
          layers.forEach((l) => {
            if (map.getLayer(l)) map.setLayoutProperty(l, 'visibility', vis);
          });
        });
        // Initial-Synchronisation: Layer-Visibility den Checkboxen anpassen.
        const vis = el.checked ? 'visible' : 'none';
        layers.forEach((l) => {
          if (map.getLayer(l)) map.setLayoutProperty(l, 'visibility', vis);
        });
      });
    }

    /* -------- UI: Exaggeration-Slider -------- */

    const exSlider = document.getElementById('exaggeration');
    const exValue = document.getElementById('exaggeration-value');
    exSlider.addEventListener('input', () => {
      const v = parseFloat(exSlider.value);
      exValue.textContent = v.toFixed(1) + '×';
      map.setTerrain({ source: 'terrain-dem', exaggeration: v });
    });

    /* -------- UI: Kollabierbare Panels -------- */

    document.querySelectorAll('.collapsible').forEach((panel) => {
      const btn = panel.querySelector('.panel-toggle');
      if (!btn) return;
      // Optional: persistenter Zustand pro Panel via localStorage.
      const key = panel.dataset.collapseKey;
      if (key) {
        try {
          if (localStorage.getItem(key) === 'collapsed') {
            panel.classList.add('collapsed');
            btn.setAttribute('aria-expanded', 'false');
          }
        } catch (_) { /* localStorage kann blockiert sein — ignorieren */ }
      }
      btn.addEventListener('click', () => {
        const collapsed = panel.classList.toggle('collapsed');
        btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        if (key) {
          try { localStorage.setItem(key, collapsed ? 'collapsed' : 'expanded'); } catch (_) {}
        }
      });
    });

    /* -------- UI: Basemap-Toggle -------- */

    document.querySelectorAll('.basemap-toggle button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.basemap-toggle button').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        const mode = btn.dataset.basemap;
        map.setLayoutProperty('dop20', 'visibility', mode === 'dop' ? 'visible' : 'none');
        map.setLayoutProperty('osm',   'visibility', mode === 'osm' ? 'visible' : 'none');
      });
    });

    /* -------- Helfer -------- */

    function bindPopup(layerId, htmlBuilder) {
      map.on('click', layerId, (e) => {
        if (!e.features || !e.features.length) return;
        const f = e.features[0];
        const lngLat = f.geometry.type === 'Point'
          ? f.geometry.coordinates.slice()
          : e.lngLat;
        new maplibregl.Popup({ offset: 12, closeButton: true, maxWidth: '280px' })
          .setLngLat(lngLat)
          .setHTML(htmlBuilder(f.properties || {}))
          .addTo(map);
      });
    }

    function computeBbox(coords) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const c of coords) {
        if (c[0] < minX) minX = c[0]; if (c[0] > maxX) maxX = c[0];
        if (c[1] < minY) minY = c[1]; if (c[1] > maxY) maxY = c[1];
      }
      return [[minX, minY], [maxX, maxY]];
    }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // Robust gegen Lade-Fehler einzelner Layer (z.B. WMS-Tile-Aussetzer).
    map.on('error', (e) => console.warn('MapLibre error:', e && e.error ? e.error.message : e));
  })();
  </script>
</body>
</html>
